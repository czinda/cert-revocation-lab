# Federation PKI Compose File - Run with: sudo podman-compose -f federation-compose.yml up -d
#
# Federated PKI Trust infrastructure simulating a second organization ("Partner Org")
# with its own PKI hierarchy, plus a Bridge CA for cross-organizational trust.
#
# Architecture:
#   Partner Root CA (self-signed) --> Partner Intermediate CA (subordinate)
#   Bridge CA (self-signed) <-- cross-certified by both Cert-Lab and Partner Root CAs
#
# Network: 172.29.0.0/24 (federation-net)
#
# NOTE: podman-compose may not honor "condition: service_healthy" in depends_on.
# The init-federation.sh script provides its own DS readiness checks as a safety net.

version: "3.8"

services:
  # 389 Directory Server for Partner Root CA
  ds-partner-root:
    image: quay.io/389ds/dirsrv:${DS_VERSION:-latest}
    container_name: ds-partner-root
    hostname: ds-partner-root.${LAB_DOMAIN:-cert-lab.local}
    environment:
      DS_DM_PASSWORD: ${DS_PASSWORD:-RedHat123}
      DS_SUFFIX_NAME: partner-root-ca
    volumes:
      - ds-partner-root-data:/data
    networks:
      federation-net:
        ipv4_address: 172.29.0.14
    healthcheck:
      test: ["CMD-SHELL", "/usr/libexec/dirsrv/dscontainer -H || ldapsearch -x -H ldap://localhost:3389 -b '' -s base > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      start_period: 120s
      retries: 10

  # 389 Directory Server for Partner Intermediate CA
  ds-partner-intermediate:
    image: quay.io/389ds/dirsrv:${DS_VERSION:-latest}
    container_name: ds-partner-intermediate
    hostname: ds-partner-intermediate.${LAB_DOMAIN:-cert-lab.local}
    environment:
      DS_DM_PASSWORD: ${DS_PASSWORD:-RedHat123}
      DS_SUFFIX_NAME: partner-intermediate-ca
    volumes:
      - ds-partner-intermediate-data:/data
    networks:
      federation-net:
        ipv4_address: 172.29.0.15
    healthcheck:
      test: ["CMD-SHELL", "/usr/libexec/dirsrv/dscontainer -H || ldapsearch -x -H ldap://localhost:3389 -b '' -s base > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      start_period: 120s
      retries: 10

  # 389 Directory Server for Bridge CA
  ds-bridge:
    image: quay.io/389ds/dirsrv:${DS_VERSION:-latest}
    container_name: ds-bridge
    hostname: ds-bridge.${LAB_DOMAIN:-cert-lab.local}
    environment:
      DS_DM_PASSWORD: ${DS_PASSWORD:-RedHat123}
      DS_SUFFIX_NAME: bridge-ca
    volumes:
      - ds-bridge-data:/data
    networks:
      federation-net:
        ipv4_address: 172.29.0.16
    healthcheck:
      test: ["CMD-SHELL", "/usr/libexec/dirsrv/dscontainer -H || ldapsearch -x -H ldap://localhost:3389 -b '' -s base > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      start_period: 120s
      retries: 10

  # Dogtag Partner Root CA - Privileged for systemd
  dogtag-partner-root-ca:
    image: quay.io/dogtagpki/pki-ca:${PKI_VERSION:-latest}
    container_name: dogtag-partner-root-ca
    hostname: partner-root-ca.${LAB_DOMAIN:-cert-lab.local}
    privileged: true
    depends_on:
      ds-partner-root:
        condition: service_healthy
    environment:
      PKI_DS_URL: ldap://ds-partner-root.cert-lab.local:3389
      PKI_DS_PASSWORD: ${DS_PASSWORD:-RedHat123}
      PKI_ADMIN_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_BACKUP_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_CLIENT_PKCS12_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_TOKEN_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_INSTANCE_NAME: pki-partner-root-ca
      DS_PASSWORD: ${DS_PASSWORD:-RedHat123}
    volumes:
      - ./configs/pki/federation:/etc/pki-configs:ro
      - ./scripts/pki:/scripts:ro
      - ./data/certs/federation:/certs
      - pki-partner-root-data:/var/lib/pki
      - pki-partner-root-logs:/var/log/pki
    extra_hosts:
      - "ds-partner-root.cert-lab.local:172.29.0.14"
      - "ds-partner-intermediate.cert-lab.local:172.29.0.15"
      - "ds-bridge.cert-lab.local:172.29.0.16"
      - "partner-root-ca.cert-lab.local:172.29.0.12"
      - "partner-intermediate-ca.cert-lab.local:172.29.0.11"
      - "bridge-ca.cert-lab.local:172.29.0.10"
    networks:
      federation-net:
        ipv4_address: 172.29.0.12
    ports:
      - "8473:8443"
      - "8490:8080"
    command: ["/bin/bash", "-c", "sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:8443/ca/admin/ca/getStatus 2>/dev/null | grep -q running || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Dogtag Partner Intermediate CA
  dogtag-partner-intermediate-ca:
    image: quay.io/dogtagpki/pki-ca:${PKI_VERSION:-latest}
    container_name: dogtag-partner-intermediate-ca
    hostname: partner-intermediate-ca.${LAB_DOMAIN:-cert-lab.local}
    privileged: true
    depends_on:
      ds-partner-intermediate:
        condition: service_healthy
      dogtag-partner-root-ca:
        condition: service_started
    environment:
      PKI_DS_URL: ldap://ds-partner-intermediate.cert-lab.local:3389
      PKI_DS_PASSWORD: ${DS_PASSWORD:-RedHat123}
      PKI_ADMIN_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_BACKUP_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_CLIENT_PKCS12_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_TOKEN_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_INSTANCE_NAME: pki-partner-intermediate-ca
      DS_PASSWORD: ${DS_PASSWORD:-RedHat123}
    volumes:
      - ./configs/pki/federation:/etc/pki-configs:ro
      - ./scripts/pki:/scripts:ro
      - ./data/certs/federation:/certs
      - pki-partner-intermediate-data:/var/lib/pki
      - pki-partner-intermediate-logs:/var/log/pki
    extra_hosts:
      - "ds-partner-root.cert-lab.local:172.29.0.14"
      - "ds-partner-intermediate.cert-lab.local:172.29.0.15"
      - "ds-bridge.cert-lab.local:172.29.0.16"
      - "partner-root-ca.cert-lab.local:172.29.0.12"
      - "partner-intermediate-ca.cert-lab.local:172.29.0.11"
      - "bridge-ca.cert-lab.local:172.29.0.10"
    networks:
      federation-net:
        ipv4_address: 172.29.0.11
    ports:
      - "8474:8443"
      - "8491:8080"
    command: ["/bin/bash", "-c", "sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:8443/ca/admin/ca/getStatus 2>/dev/null | grep -q running || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Dogtag Bridge CA - Trust anchor connecting both organizations
  dogtag-bridge-ca:
    image: quay.io/dogtagpki/pki-ca:${PKI_VERSION:-latest}
    container_name: dogtag-bridge-ca
    hostname: bridge-ca.${LAB_DOMAIN:-cert-lab.local}
    privileged: true
    depends_on:
      ds-bridge:
        condition: service_healthy
    environment:
      PKI_DS_URL: ldap://ds-bridge.cert-lab.local:3389
      PKI_DS_PASSWORD: ${DS_PASSWORD:-RedHat123}
      PKI_ADMIN_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_BACKUP_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_CLIENT_PKCS12_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_TOKEN_PASSWORD: ${PKI_ADMIN_PASSWORD:-RedHat123}
      PKI_INSTANCE_NAME: pki-bridge-ca
      DS_PASSWORD: ${DS_PASSWORD:-RedHat123}
    volumes:
      - ./configs/pki/federation:/etc/pki-configs:ro
      - ./scripts/pki:/scripts:ro
      - ./data/certs/federation:/certs
      - pki-bridge-data:/var/lib/pki
      - pki-bridge-logs:/var/log/pki
    extra_hosts:
      - "ds-partner-root.cert-lab.local:172.29.0.14"
      - "ds-partner-intermediate.cert-lab.local:172.29.0.15"
      - "ds-bridge.cert-lab.local:172.29.0.16"
      - "partner-root-ca.cert-lab.local:172.29.0.12"
      - "partner-intermediate-ca.cert-lab.local:172.29.0.11"
      - "bridge-ca.cert-lab.local:172.29.0.10"
    networks:
      federation-net:
        ipv4_address: 172.29.0.10
    ports:
      - "8475:8443"
      - "8492:8080"
    command: ["/bin/bash", "-c", "sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:8443/ca/admin/ca/getStatus 2>/dev/null | grep -q running || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  federation-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  ds-partner-root-data:
  ds-partner-intermediate-data:
  ds-bridge-data:
  pki-partner-root-data:
  pki-partner-root-logs:
  pki-partner-intermediate-data:
  pki-partner-intermediate-logs:
  pki-bridge-data:
  pki-bridge-logs:
