# Partner Organization Root CA Configuration
# Self-signed root CA for the "Partner Org" simulated organization.
# Part of the Federated PKI Trust infrastructure that demonstrates
# cross-organizational trust via a Bridge CA.

[DEFAULT]
pki_instance_name = pki-partner-root-ca
pki_https_port = 8443
pki_http_port = 8080

pki_admin_password = %(pki_admin_password)s
pki_ds_password = %(pki_ds_password)s
pki_ds_url = ldap://ds-partner-root.cert-lab.local:3389
pki_ds_database = partner-root-ca

pki_security_domain_name = PARTNER-ORG
pki_ca_signing_key_type = rsa
pki_ca_signing_key_algorithm = SHA512withRSA
pki_ca_signing_key_size = 4096
pki_ca_signing_signing_algorithm = SHA512withRSA

pki_ca_signing_subject_dn = cn=Partner Organization Root CA,o=Partner Org,c=US

[CA]
pki_admin_email = admin@partner-org.local
pki_admin_name = caadmin
pki_admin_nickname = PKI Administrator for pki-partner-root-ca
