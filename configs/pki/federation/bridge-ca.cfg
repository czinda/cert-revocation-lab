# PKI Federation Bridge CA Configuration
# Self-signed Bridge CA that acts as the trust anchor connecting
# the Cert-Lab organization and the Partner organization.
# Both organizations cross-certify with this Bridge CA to establish
# bilateral trust without direct trust between their root CAs.

[DEFAULT]
pki_instance_name = pki-bridge-ca
pki_https_port = 8443
pki_http_port = 8080

pki_admin_password = %(pki_admin_password)s
pki_ds_password = %(pki_ds_password)s
pki_ds_url = ldap://ds-bridge.cert-lab.local:3389
pki_ds_database = bridge-ca

pki_security_domain_name = BRIDGE-PKI
pki_ca_signing_key_type = rsa
pki_ca_signing_key_algorithm = SHA512withRSA
pki_ca_signing_key_size = 4096
pki_ca_signing_signing_algorithm = SHA512withRSA

pki_ca_signing_subject_dn = cn=PKI Federation Bridge CA,o=PKI Bridge,c=US

[CA]
pki_admin_email = admin@bridge.cert-lab.local
pki_admin_name = caadmin
pki_admin_nickname = PKI Administrator for pki-bridge-ca
