# Partner Organization Intermediate CA Configuration
# Subordinate CA signed by the Partner Root CA.
# Part of the Federated PKI Trust infrastructure that demonstrates
# cross-organizational trust via a Bridge CA.

[DEFAULT]
pki_instance_name = pki-partner-intermediate-ca
pki_https_port = 8443
pki_http_port = 8080

pki_admin_password = %(pki_admin_password)s
pki_ds_password = %(pki_ds_password)s
pki_ds_url = ldap://ds-partner-intermediate.cert-lab.local:3389
pki_ds_database = partner-intermediate-ca

pki_security_domain_name = PARTNER-ORG
pki_ca_signing_key_type = rsa
pki_ca_signing_key_algorithm = SHA512withRSA
pki_ca_signing_key_size = 4096
pki_ca_signing_signing_algorithm = SHA512withRSA

pki_ca_signing_subject_dn = cn=Partner Organization Intermediate CA,o=Partner Org,c=US

pki_subordinate = True
pki_subordinate_create_new_security_domain = False

[CA]
pki_admin_email = admin@partner-org.local
pki_admin_name = caadmin
pki_admin_nickname = PKI Administrator for pki-partner-intermediate-ca
