# Dogtag PKI OCSP Responder Configuration - ECC P-384
# Standalone OCSP responder that gets its signing cert from the ECC Intermediate CA
# and joins the ECC Root CA's security domain.

[DEFAULT]
# Administrative credentials
pki_admin_email=admin@cert-lab.local
pki_admin_name=admin
pki_admin_password=RedHat123
pki_admin_uid=admin

# Security passwords
pki_backup_password=RedHat123
pki_client_database_password=RedHat123
pki_client_pkcs12_password=RedHat123
pki_token_password=RedHat123

# Directory Server connection
pki_ds_url=ldap://ds-ecc-ocsp.cert-lab.local:3389
pki_ds_bind_dn=cn=Directory Manager
pki_ds_password=RedHat123
pki_ds_database=ecc-ocsp
pki_ds_base_dn=dc=pki,dc=ecc-ocsp

# Security domain - join the ECC Root CA's domain
pki_security_domain_hostname=ecc-root-ca.cert-lab.local
pki_security_domain_https_port=8443
pki_security_domain_name=CERT-LAB-ECC
pki_security_domain_user=caadmin
pki_security_domain_password=RedHat123

# Instance configuration
pki_instance_name=pki-ecc-ocsp
pki_https_port=8443
pki_http_port=8080
pki_ajp_port=8009
pki_tomcat_server_port=8005

# Hostname
pki_hostname=ecc-ocsp.cert-lab.local

[OCSP]
# Issuing CA for OCSP signing certificate
pki_issuing_ca=https://ecc-intermediate-ca.cert-lab.local:8443

# OCSP Signing Certificate - ECC P-384
pki_ocsp_signing_subject_dn=CN=OCSP Signing Certificate,OU=ECC OCSP Responder,O=Cert-Lab,C=US
pki_ocsp_signing_key_algorithm=SHA384withEC
pki_ocsp_signing_key_size=nistp384
pki_ocsp_signing_key_type=ecc
pki_ocsp_signing_signing_algorithm=SHA384withEC

# Audit Signing Certificate - ECC P-384
pki_audit_signing_subject_dn=CN=Audit Signing Certificate,OU=ECC OCSP Responder,O=Cert-Lab,C=US
pki_audit_signing_key_algorithm=SHA384withEC
pki_audit_signing_key_size=nistp384
pki_audit_signing_key_type=ecc
pki_audit_signing_signing_algorithm=SHA384withEC

# Subsystem Certificate - ECC P-384
pki_subsystem_subject_dn=CN=Subsystem Certificate,OU=ECC OCSP Responder,O=Cert-Lab,C=US
pki_subsystem_key_algorithm=SHA384withEC
pki_subsystem_key_size=nistp384
pki_subsystem_key_type=ecc

# SSL Server Certificate - ECC P-384
pki_sslserver_subject_dn=CN=ecc-ocsp.cert-lab.local,OU=ECC OCSP Responder,O=Cert-Lab,C=US
pki_sslserver_key_algorithm=SHA384withEC
pki_sslserver_key_size=nistp384
pki_sslserver_key_type=ecc

# Admin certificate
pki_admin_subject_dn=CN=PKI Administrator,OU=ECC OCSP Responder,O=Cert-Lab,C=US
