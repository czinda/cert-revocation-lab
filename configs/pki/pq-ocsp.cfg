# Dogtag PKI OCSP Responder Configuration - Hybrid ML-DSA-87 + RSA-2048 (Post-Quantum)
# Standalone OCSP responder that gets its signing cert from the PQ Intermediate CA
# and joins the PQ Root CA's security domain.
# Hybrid approach: ML-DSA-87 for OCSP signing (post-quantum security),
# RSA-2048 for TLS server, subsystem, admin, and audit certs (OpenSSL/TLS compatibility)

[DEFAULT]
# Administrative credentials
pki_admin_email=admin@cert-lab.local
pki_admin_name=admin
pki_admin_password=RedHat123
pki_admin_uid=admin

# Security passwords
pki_backup_password=RedHat123
pki_client_database_password=RedHat123
pki_client_pkcs12_password=RedHat123
pki_token_password=RedHat123

# Directory Server connection
pki_ds_url=ldap://ds-pq-ocsp.cert-lab.local:3389
pki_ds_bind_dn=cn=Directory Manager
pki_ds_password=RedHat123
pki_ds_database=pq-ocsp
pki_ds_base_dn=dc=pki,dc=pq-ocsp

# Security domain - join the PQ Intermediate CA's domain
# (Intermediate CA manages its own security domain after pkispawn step2)
pki_security_domain_hostname=pq-intermediate-ca.cert-lab.local
pki_security_domain_https_port=8443
pki_security_domain_name=CERT-LAB-PQ
pki_security_domain_user=caadmin
pki_security_domain_password=RedHat123

# Instance configuration
pki_instance_name=pki-pq-ocsp
pki_https_port=8443
pki_http_port=8080
pki_ajp_port=8009
pki_tomcat_server_port=8005

# Hostname
pki_hostname=pq-ocsp.cert-lab.local

[OCSP]
# Issuing CA for OCSP signing certificate
pki_issuing_ca=https://pq-intermediate-ca.cert-lab.local:8443

# OCSP Signing Certificate - ML-DSA-87
pki_ocsp_signing_subject_dn=CN=OCSP Signing Certificate,OU=PQ OCSP Responder,O=Cert-Lab,C=US
pki_ocsp_signing_key_algorithm=ML-DSA-87
pki_ocsp_signing_key_size=87
pki_ocsp_signing_key_type=mldsa
pki_ocsp_signing_signing_algorithm=ML-DSA-87

# Audit Signing Certificate - RSA-2048 (NSS verification compatibility)
pki_audit_signing_subject_dn=CN=Audit Signing Certificate,OU=PQ OCSP Responder,O=Cert-Lab,C=US
pki_audit_signing_key_algorithm=SHA256withRSA
pki_audit_signing_key_size=2048
pki_audit_signing_key_type=rsa
pki_audit_signing_signing_algorithm=ML-DSA-87

# Subsystem Certificate - RSA-2048 (TLS mutual auth compatibility)
pki_subsystem_subject_dn=CN=Subsystem Certificate,OU=PQ OCSP Responder,O=Cert-Lab,C=US
pki_subsystem_key_algorithm=SHA256withRSA
pki_subsystem_key_size=2048
pki_subsystem_key_type=rsa

# SSL Server Certificate - RSA-2048 (OpenSSL/TLS handshake compatibility)
pki_sslserver_subject_dn=CN=pq-ocsp.cert-lab.local,OU=PQ OCSP Responder,O=Cert-Lab,C=US
pki_sslserver_key_algorithm=SHA256withRSA
pki_sslserver_key_size=2048
pki_sslserver_key_type=rsa

# Admin certificate - RSA-2048 (PKCS#12 export compatibility)
pki_admin_subject_dn=CN=PKI Administrator,OU=PQ OCSP Responder,O=Cert-Lab,C=US
pki_admin_key_algorithm=SHA256withRSA
pki_admin_key_size=2048
pki_admin_key_type=rsa
