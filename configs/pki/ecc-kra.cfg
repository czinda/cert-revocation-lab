# Dogtag PKI Key Recovery Authority Configuration - ECC P-384
# KRA provides key archival and recovery services.
# Joins the ECC Root CA's security domain.
#
# Single-step pkispawn: pkispawn -s KRA -f ecc-kra.cfg

[DEFAULT]
pki_admin_email=admin@cert-lab.local
pki_admin_name=admin
pki_admin_password=RedHat123
pki_admin_uid=admin

pki_backup_password=RedHat123
pki_client_database_password=RedHat123
pki_client_pkcs12_password=RedHat123
pki_token_password=RedHat123

pki_ds_url=ldap://ds-ecc-kra.cert-lab.local:3389
pki_ds_bind_dn=cn=Directory Manager
pki_ds_password=RedHat123
pki_ds_database=kra
pki_ds_base_dn=dc=pki,dc=kra

pki_security_domain_hostname=ecc-root-ca.cert-lab.local
pki_security_domain_https_port=8443
pki_security_domain_name=CERT-LAB-ECC
pki_security_domain_user=caadmin
pki_security_domain_password=RedHat123

pki_instance_name=pki-ecc-kra
pki_https_port=8443
pki_http_port=8080
pki_ajp_port=8009
pki_tomcat_server_port=8005

pki_hostname=ecc-kra.cert-lab.local

[KRA]
pki_issuing_ca=https://ecc-intermediate-ca.cert-lab.local:8443

pki_storage_subject_dn=CN=DRM Storage Certificate,OU=Key Recovery Authority,O=Cert-Lab-ECC,C=US
pki_storage_key_algorithm=SHA384withEC
pki_storage_key_size=nistp384
pki_storage_key_type=ecc

pki_transport_subject_dn=CN=DRM Transport Certificate,OU=Key Recovery Authority,O=Cert-Lab-ECC,C=US
pki_transport_key_algorithm=SHA384withEC
pki_transport_key_size=nistp384
pki_transport_key_type=ecc

pki_audit_signing_subject_dn=CN=Audit Signing Certificate,OU=Key Recovery Authority,O=Cert-Lab-ECC,C=US
pki_audit_signing_key_algorithm=SHA384withEC
pki_audit_signing_key_size=nistp384
pki_audit_signing_key_type=ecc
pki_audit_signing_signing_algorithm=SHA384withEC

pki_subsystem_subject_dn=CN=Subsystem Certificate,OU=Key Recovery Authority,O=Cert-Lab-ECC,C=US
pki_subsystem_key_algorithm=SHA384withEC
pki_subsystem_key_size=nistp384
pki_subsystem_key_type=ecc

pki_sslserver_subject_dn=CN=ecc-kra.cert-lab.local,OU=Key Recovery Authority,O=Cert-Lab-ECC,C=US
pki_sslserver_key_algorithm=SHA384withEC
pki_sslserver_key_size=nistp384
pki_sslserver_key_type=ecc

pki_admin_subject_dn=CN=PKI Administrator,OU=Key Recovery Authority,O=Cert-Lab-ECC,C=US
