# Dogtag PKI Key Recovery Authority Configuration - RSA-4096
# KRA provides key archival and recovery services.
# Joins the Root CA's security domain, gets certs from Intermediate CA.
#
# Single-step pkispawn: pkispawn -s KRA -f kra.cfg

[DEFAULT]
# Administrative credentials
pki_admin_email=admin@cert-lab.local
pki_admin_name=admin
pki_admin_password=RedHat123
pki_admin_uid=admin

# Security passwords
pki_backup_password=RedHat123
pki_client_database_password=RedHat123
pki_client_pkcs12_password=RedHat123
pki_token_password=RedHat123

# Directory Server connection
pki_ds_url=ldap://ds-kra.cert-lab.local:3389
pki_ds_bind_dn=cn=Directory Manager
pki_ds_password=RedHat123
pki_ds_database=kra
pki_ds_base_dn=dc=pki,dc=kra

# Security domain - join the Root CA's domain
pki_security_domain_hostname=root-ca.cert-lab.local
pki_security_domain_https_port=8443
pki_security_domain_name=CERT-LAB
pki_security_domain_user=caadmin
pki_security_domain_password=RedHat123

# Instance configuration
pki_instance_name=pki-kra
pki_https_port=8443
pki_http_port=8080
pki_ajp_port=8009
pki_tomcat_server_port=8005

# Hostname
pki_hostname=kra.cert-lab.local

[KRA]
# Issuing CA for KRA certificates
pki_issuing_ca=https://intermediate-ca.cert-lab.local:8443

# Storage Certificate (encrypts archived keys)
pki_storage_subject_dn=CN=DRM Storage Certificate,OU=Key Recovery Authority,O=Cert-Lab,C=US
pki_storage_key_algorithm=SHA512withRSA
pki_storage_key_size=4096
pki_storage_key_type=rsa

# Transport Certificate (secures key transport to KRA)
pki_transport_subject_dn=CN=DRM Transport Certificate,OU=Key Recovery Authority,O=Cert-Lab,C=US
pki_transport_key_algorithm=SHA512withRSA
pki_transport_key_size=4096
pki_transport_key_type=rsa

# Audit Signing Certificate
pki_audit_signing_subject_dn=CN=Audit Signing Certificate,OU=Key Recovery Authority,O=Cert-Lab,C=US
pki_audit_signing_key_algorithm=SHA512withRSA
pki_audit_signing_key_size=4096
pki_audit_signing_key_type=rsa
pki_audit_signing_signing_algorithm=SHA512withRSA

# Subsystem Certificate
pki_subsystem_subject_dn=CN=Subsystem Certificate,OU=Key Recovery Authority,O=Cert-Lab,C=US
pki_subsystem_key_algorithm=SHA512withRSA
pki_subsystem_key_size=4096
pki_subsystem_key_type=rsa

# SSL Server Certificate
pki_sslserver_subject_dn=CN=kra.cert-lab.local,OU=Key Recovery Authority,O=Cert-Lab,C=US
pki_sslserver_key_algorithm=SHA512withRSA
pki_sslserver_key_size=4096
pki_sslserver_key_type=rsa

# Admin certificate
pki_admin_subject_dn=CN=PKI Administrator,OU=Key Recovery Authority,O=Cert-Lab,C=US
