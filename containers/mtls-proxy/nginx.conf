worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 128;
}

http {
    log_format mtls '$remote_addr - $ssl_client_s_dn - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"ssl_client_verify=$ssl_client_verify" '
                    '"ssl_client_serial=$ssl_client_serial"';

    access_log /var/log/nginx/access.log mtls;

    # Health check endpoint (no TLS)
    server {
        listen 8080;
        server_name _;

        location /health {
            return 200 '{"status":"healthy","service":"mtls-proxy"}';
            add_header Content-Type application/json;
        }
    }

    # mTLS-enforced reverse proxy
    server {
        listen 8443 ssl;
        server_name mtls-proxy.cert-lab.local;

        # Server certificate (signed by Intermediate CA)
        ssl_certificate     /etc/nginx/certs/server.pem;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Client certificate verification
        ssl_client_certificate /etc/nginx/certs/ca-chain.pem;
        ssl_verify_client on;
        ssl_verify_depth 3;

        # CRL-based revocation checking
        ssl_crl /etc/nginx/crl/ca.crl;

        # TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Proxy headers with client cert info
        proxy_set_header X-SSL-Client-DN    $ssl_client_s_dn;
        proxy_set_header X-SSL-Client-Serial $ssl_client_serial;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header X-SSL-Client-CN     $ssl_client_s_dn_cn;
        proxy_set_header Host                $host;

        # Status endpoint showing client cert details
        location /whoami {
            return 200 '{"client_dn":"$ssl_client_s_dn","client_serial":"$ssl_client_serial","client_verify":"$ssl_client_verify","client_cn":"$ssl_client_s_dn_cn","server":"mtls-proxy"}';
            add_header Content-Type application/json;
        }

        # Proxy to mock EDR (demonstrates mTLS gateway pattern)
        location /api/ {
            proxy_pass http://edr.cert-lab.local:8000/;
        }

        # Default
        location / {
            return 200 '{"message":"mTLS authenticated","client_dn":"$ssl_client_s_dn","client_verify":"$ssl_client_verify"}';
            add_header Content-Type application/json;
        }
    }
}
