# PyKMIP Server Configuration
# Provides KMIP v1.2+ key management protocol over TLS.
# TLS client authentication is disabled to allow the FastAPI management
# API to connect without a client certificate.

[server]
hostname=0.0.0.0
port=5696
certificate_path=/app/certs/server.pem
key_path=/app/certs/server-key.pem
ca_path=/app/certs/ca-chain.pem
auth_suite=TLS1.2
policy_path=/app/policies
enable_tls_client_auth=False
database_path=/data/kmip/pykmip.db

[client]
hostname=localhost
port=5696
