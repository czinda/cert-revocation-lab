worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 64;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 30;

    server {
        listen 8080;
        server_name crl.cert-lab.local;

        # Health check
        location /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"crl-server"}';
        }

        # CRL Distribution Points (RFC 5280 Section 4.2.1.13)
        # Serve DER-encoded CRLs with correct Content-Type
        location /crl/ {
            alias /var/www/crl/;
            default_type application/pkix-crl;
            add_header X-CRL-Server "cert-lab-cdp";
            add_header Cache-Control "public, max-age=300";
        }

        # PEM-encoded CRLs (convenience endpoint)
        location /pem/ {
            alias /var/www/crl/;
            default_type application/x-pem-file;
            add_header X-CRL-Server "cert-lab-cdp";
        }

        # CRL index page
        location / {
            default_type application/json;
            alias /var/www/crl/;
            autoindex on;
            autoindex_format json;
        }
    }
}
